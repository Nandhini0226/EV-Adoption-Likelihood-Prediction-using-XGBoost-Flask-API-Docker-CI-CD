name: EV Adoption CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v5

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      # Install dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Verify project structure
      - name: Verify Project Structure
        run: |
          echo "Repository Contents:"
          ls -la
          echo ""
          echo "Data Directory:"
          ls -la data
          echo ""
          echo "Models Directory:"
          ls -la models
          echo ""
          echo "Source Directory:"
          ls -la src

      # Train the model
      - name: Train Model
        run: |
          python src/train.py

      # Run prediction
      - name: Run Prediction
        run: |
          python src/predict.py

      # Confirm generated model files
      - name: Verify Generated Models
        run: |
          echo "Generated model files:"
          ls -la models
